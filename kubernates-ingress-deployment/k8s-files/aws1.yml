apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws1-deployment
  labels:
    app: aws1

spec:
  replicas: 2

  selector:
    matchLabels:
      app: aws1

  template:
    metadata:
      labels:
        app: aws1

    spec:
      containers:
        - name: aws1
          image: 992382715314.dkr.ecr.us-east-1.amazonaws.com/aws:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: aws1-service

spec:
  selector:
    app: aws1

  ports:
    - port: 80
      targetPort: 80

  type: ClusterIP
